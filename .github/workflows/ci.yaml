name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies (clean install)
        run: npm ci

      - name: Lint & Format & Type check
        run: npm run check:basic

      - name: Run tests
        run: npm run test

      - name: Build package
        run: npm run build

      - name: Verify npm pack works
        run: npm pack